<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Peekr — Meet Someone New</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='20' fill='%23c8f5e8'/><text y='.9em' font-size='80' x='10'>👀</text></svg>" />
  <link rel="stylesheet" href="home.css" />
</head>
<body>
  <div class="page">
    <div class="blobs" aria-hidden="true">
      <div class="blob blob--mint"></div>
      <div class="blob blob--lilac"></div>
      <div class="blob blob--peach"></div>
      <div class="blob blob--lemon"></div>
    </div>
    <main class="card">
      <div class="card__top">
        <div class="logo">Peekr <span class="logo__eye">👀</span></div>
        <div class="badge">✦ beta</div>
      </div>
      <h1 class="headline">Meet someone<br/><span class="headline__outline">new.</span></h1>
      <p class="sub">Random video &amp; text chat with strangers. No account, no history — just hit start.</p>
      <div class="chips">
        <span class="chip chip--mint">🎥 HD Video</span>
        <span class="chip chip--lilac">💬 P2P Chat</span>
        <span class="chip chip--peach">🔒 Encrypted</span>
        <span class="chip chip--lemon">⚡ Instant</span>
      </div>
      <a class="btn-start" href="/chat.html">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <path d="M15 10l4.553-2.276A1 1 0 0 1 21 8.723v6.554a1 1 0 0 1-1.447.894L15 14M4 8h11a2 2 0 0 1 2 2v4a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2Z"/>
        </svg>
        Start Chatting
      </a>
      <p class="disclaimer">be kind · respect others · 13+ only</p>
      <div class="stats">
        <div class="stat"><span class="stat__num">P2P</span><span class="stat__label">encrypted</span></div>
        <div class="stat__divider"></div>
        <div class="stat"><span class="stat__num">0</span><span class="stat__label">accounts needed</span></div>
        <div class="stat__divider"></div>
        <div class="stat"><span class="stat__num">∞</span><span class="stat__label">strangers</span></div>
      </div>
    </main>
  </div>
</body>
</html>
